name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: spotless and checkstyle
        run: mvn -B -ntp spotless:check checkstyle:check

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: build and test with coverage gate
        run: mvn -B -ntp verify
      - name: upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: end to end api check
        run: mvn -B -ntp -Dtest=none -Dsurefire.failIfNoSpecifiedTests=false -Dit.test=EquipFleetApiIT -DfailIfNoTests=false -Djacoco.line.coverage=0.0 verify

  bench-regress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: build benchmark
        run: mvn -B -ntp -DskipTests test-compile
      - name: run rollup benchmark and check for regression
        run: mvn -B -ntp -q exec:java | tee bench-output.txt && grep '^BENCH' bench-output.txt | python3 bench/check_regression.py

  build-images:
    runs-on: ubuntu-latest
    needs: [lint, build-test]
    steps:
      - uses: actions/checkout@v4
      - name: build application image
        run: docker build -t equipfleet:ci .
